<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - StudentHub</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Supabase JS Client -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <style>
        body {
            font-family: 'Inter', sans-serif;
            background: #0a0a0f;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0;
            padding: 20px;
        }
        .login-box {
            background: rgba(255,255,255,0.05);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 24px;
            padding: 40px;
            max-width: 400px;
            width: 100%;
            box-shadow: 0 20px 60px rgba(0,0,0,0.5);
        }
        .gradient-text {
            background: linear-gradient(135deg, #ec4899, #a855f7);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .input-field {
            width: 100%;
            padding: 14px 18px;
            border-radius: 12px;
            border: 2px solid rgba(255,255,255,0.1);
            background: rgba(255,255,255,0.05);
            color: white;
            font-size: 15px;
            transition: all 0.3s;
        }
        .input-field:focus {
            border-color: #ec4899;
            outline: none;
            box-shadow: 0 0 20px rgba(236,72,153,0.1);
        }
        .input-field::placeholder {
            color: rgba(255,255,255,0.3);
        }
        .btn-primary {
            width: 100%;
            padding: 16px;
            border-radius: 12px;
            border: none;
            background: linear-gradient(135deg, #ec4899, #a855f7);
            color: white;
            font-weight: 700;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.3s;
        }
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(236,72,153,0.3);
        }
        .btn-primary:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        .toast {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            padding: 16px 24px;
            border-radius: 12px;
            color: white;
            font-weight: 500;
            z-index: 9999;
            display: none;
            max-width: 90%;
        }
        .toast.success {
            background: rgba(16,185,129,0.9);
            display: block;
        }
        .toast.error {
            background: rgba(239,68,68,0.9);
            display: block;
        }
        .spinner {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255,255,255,0.3);
            border-top: 3px solid white;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-right: 8px;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .sweet-bg {
            position: fixed;
            inset: 0;
            z-index: -1;
            opacity: 0.1;
            pointer-events: none;
            font-size: 40px;
        }
    </style>
</head>
<body>

    <!-- Background Sweet Elements -->
    <div class="sweet-bg" style="top:10%;left:5%;">🍰</div>
    <div class="sweet-bg" style="bottom:15%;right:8%;">🎂</div>
    <div class="sweet-bg" style="top:40%;left:3%;">🍩</div>
    <div class="sweet-bg" style="top:60%;right:5%;">🧁</div>
    <div class="sweet-bg" style="top:20%;right:15%;">🍭</div>
    <div class="sweet-bg" style="bottom:30%;left:10%;">🍬</div>

    <!-- Toast -->
    <div id="toast" class="toast"></div>

    <!-- Login Box -->
    <div class="login-box">
        <!-- Logo -->
        <div class="text-center mb-8">
            <div class="w-20 h-20 rounded-2xl bg-gradient-to-br from-pink-500 to-purple-600 flex items-center justify-center mx-auto mb-4 shadow-lg shadow-pink-500/30">
                <i class="fas fa-graduation-cap text-white text-3xl"></i>
            </div>
            <h1 class="text-3xl font-bold gradient-text">StudentHub</h1>
            <p class="text-white/40 mt-1 text-sm">Masuk ke dashboard mahasiswa</p>
        </div>

        <!-- Form Login -->
        <form id="loginForm" class="space-y-4">
            <div>
                <label class="block text-sm font-semibold text-white/60 mb-2">
                    <i class="fas fa-envelope mr-2"></i> Email
                </label>
                <input 
                    type="email" 
                    id="email" 
                    required 
                    class="input-field" 
                    placeholder="Masukkan email Anda"
                    value="demo@studenthub.com"
                >
            </div>

            <div>
                <label class="block text-sm font-semibold text-white/60 mb-2">
                    <i class="fas fa-lock mr-2"></i> Password
                </label>
                <input 
                    type="password" 
                    id="password" 
                    required 
                    class="input-field" 
                    placeholder="Masukkan password Anda"
                    value="demo123456"
                >
            </div>

            <button type="submit" id="loginBtn" class="btn-primary">
                <i class="fas fa-sign-in-alt mr-2"></i>
                Masuk
            </button>
        </form>

        <!-- Register Link -->
        <div class="mt-6 text-center">
            <p class="text-white/40 text-sm">
                Belum punya akun? 
                <a href="#" onclick="showRegister()" class="text-pink-400 hover:text-pink-300 font-semibold">
                    Daftar sekarang
                </a>
            </p>
        </div>

        <!-- Demo Button -->
        <div class="mt-4 text-center">
            <button onclick="fillDemo()" class="text-white/40 hover:text-white/70 text-sm bg-white/5 hover:bg-white/10 px-4 py-2 rounded-xl border border-white/5">
                <i class="fas fa-user-astronaut mr-2"></i>
                Isi Akun Demo
            </button>
        </div>
    </div>

    <!-- Register Modal -->
    <div id="registerModal" style="display:none;position:fixed;inset:0;z-index:9998;background:rgba(0,0,0,0.7);backdrop-filter:blur(10px);align-items:center;justify-content:center;padding:20px;">
        <div style="background:rgba(255,255,255,0.05);backdrop-filter:blur(30px);border:1px solid rgba(236,72,153,0.2);border-radius:24px;padding:40px;max-width:400px;width:100%;">
            <div class="flex items-center justify-between mb-6">
                <h2 class="text-2xl font-bold text-white">
                    <i class="fas fa-user-plus text-pink-400 mr-2"></i>
                    Daftar Akun
                </h2>
                <button onclick="closeRegister()" class="text-white/40 hover:text-white text-2xl">
                    <i class="fas fa-times"></i>
                </button>
            </div>
            
            <form id="registerForm" class="space-y-4">
                <div>
                    <label class="block text-sm font-semibold text-white/60 mb-2">Nama Lengkap</label>
                    <input type="text" id="regName" required class="input-field" placeholder="Masukkan nama lengkap">
                </div>
                <div>
                    <label class="block text-sm font-semibold text-white/60 mb-2">Email</label>
                    <input type="email" id="regEmail" required class="input-field" placeholder="Masukkan email">
                </div>
                <div>
                    <label class="block text-sm font-semibold text-white/60 mb-2">Password</label>
                    <input type="password" id="regPassword" required class="input-field" placeholder="Minimal 6 karakter">
                </div>
                <div>
                    <label class="block text-sm font-semibold text-white/60 mb-2">Konfirmasi Password</label>
                    <input type="password" id="regConfirmPassword" required class="input-field" placeholder="Konfirmasi password">
                </div>
                <button type="submit" id="registerBtn" class="btn-primary">
                    <i class="fas fa-user-plus mr-2"></i>
                    Daftar
                </button>
            </form>

            <div class="mt-4 text-center">
                <p class="text-white/40 text-sm">
                    Sudah punya akun? 
                    <a href="#" onclick="closeRegister()" class="text-pink-400 hover:text-pink-300 font-semibold">
                        Masuk di sini
                    </a>
                </p>
            </div>
        </div>
    </div>

    <script>
        // ==========================================
        // SUPABASE SETUP
        // ==========================================
        const SUPABASE_URL = 'https://uqkbibbfyfroartqrdem.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_CWW6pPcL-E4nnPOHqk88FA_Rw5In8AP';
        const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        // ==========================================
        // TOAST FUNCTION
        // ==========================================
        function showToast(message, type = 'success') {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.className = `toast ${type}`;
            toast.style.display = 'block';
            
            setTimeout(() => {
                toast.style.display = 'none';
            }, 4000);
        }

        // ==========================================
        // REGISTER FUNCTIONS
        // ==========================================
        function showRegister() {
            document.getElementById('registerModal').style.display = 'flex';
        }

        function closeRegister() {
            document.getElementById('registerModal').style.display = 'none';
        }

        // ==========================================
        // DEMO ACCOUNT
        // ==========================================
        function fillDemo() {
            document.getElementById('email').value = 'demo@studenthub.com';
            document.getElementById('password').value = 'demo123456';
            showToast('✅ Akun demo telah diisi!', 'success');
        }

        // ==========================================
        // LOGIN
        // ==========================================
        document.getElementById('loginForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const btn = document.getElementById('loginBtn');
            const originalText = btn.innerHTML;
            btn.disabled = true;
            btn.innerHTML = '<span class="spinner"></span> Memproses...';

            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;

            try {
                const { data, error } = await sb.auth.signInWithPassword({
                    email: email,
                    password: password
                });

                if (error) {
                    showToast('❌ ' + error.message, 'error');
                } else {
                    showToast('✅ Login berhasil!', 'success');
                    
                    localStorage.setItem('sb-user', JSON.stringify(data.user));
                    localStorage.setItem('sb-session', JSON.stringify(data.session));
                    
                    setTimeout(() => {
                        window.location.href = 'index.html';
                    }, 1500);
                }
            } catch (error) {
                showToast('❌ Terjadi kesalahan', 'error');
            }

            btn.disabled = false;
            btn.innerHTML = originalText;
        });

        // ==========================================
        // REGISTER
        // ==========================================
        document.getElementById('registerForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const btn = document.getElementById('registerBtn');
            const originalText = btn.innerHTML;
            btn.disabled = true;
            btn.innerHTML = '<span class="spinner"></span> Memproses...';

            const name = document.getElementById('regName').value.trim();
            const email = document.getElementById('regEmail').value.trim();
            const password = document.getElementById('regPassword').value;
            const confirmPassword = document.getElementById('regConfirmPassword').value;

            if (password.length < 6) {
                showToast('❌ Password minimal 6 karakter!', 'error');
                btn.disabled = false;
                btn.innerHTML = originalText;
                return;
            }

            if (password !== confirmPassword) {
                showToast('❌ Password tidak sama!', 'error');
                btn.disabled = false;
                btn.innerHTML = originalText;
                return;
            }

            try {
                const { data, error } = await sb.auth.signUp({
                    email: email,
                    password: password,
                    options: {
                        data: { name: name, full_name: name }
                    }
                });

                if (error) {
                    showToast('❌ ' + error.message, 'error');
                } else {
                    showToast('✅ Pendaftaran berhasil!', 'success');
                    closeRegister();
                    document.getElementById('registerForm').reset();
                    document.getElementById('email').value = email;
                }
            } catch (error) {
                showToast('❌ Terjadi kesalahan', 'error');
            }

            btn.disabled = false;
            btn.innerHTML = originalText;
        });

        // ==========================================
        // ENTER KEY SUPPORT
        // ==========================================
        document.getElementById('password').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                document.getElementById('loginForm').dispatchEvent(new Event('submit'));
            }
        });

        // ==========================================
        // CHECK SESSION
        // ==========================================
        (async function checkSession() {
            try {
                const sessionData = localStorage.getItem('sb-session');
                if (sessionData) {
                    const session = JSON.parse(sessionData);
                    if (session && session.user) {
                        window.location.href = 'index.html';
                    }
                }
            } catch (error) {
                console.log('Session check error:', error);
            }
        })();

        // Close modal on ESC
        document.addEventListener('keydown', function(e) {
            if (e.key === 'Escape') closeRegister();
        });

        // Close modal on outside click
        document.getElementById('registerModal').addEventListener('click', function(e) {
            if (e.target === this) closeRegister();
        });
    </script>
</body>
</html>
