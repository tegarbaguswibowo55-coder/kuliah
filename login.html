<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - StudentHub</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Supabase JS Client -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Inter', sans-serif;
            background: #0a0a0f;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            margin: 0;
        }

        .login-bg {
            position: fixed;
            inset: 0;
            z-index: -1;
            background: 
                radial-gradient(ellipse at 20% 50%, rgba(236, 72, 153, 0.15) 0%, transparent 60%),
                radial-gradient(ellipse at 80% 20%, rgba(168, 85, 247, 0.15) 0%, transparent 50%),
                radial-gradient(ellipse at 50% 80%, rgba(244, 63, 94, 0.1) 0%, transparent 50%),
                linear-gradient(135deg, #0a0a0f 0%, #1a0a1a 50%, #0a0a1f 100%);
        }

        .glass-login {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(30px);
            -webkit-backdrop-filter: blur(30px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 20px 80px rgba(0, 0, 0, 0.5);
            width: 100%;
            max-width: 420px;
            border-radius: 24px;
            padding: 40px 32px;
            position: relative;
            z-index: 10;
        }

        .gradient-text {
            background: linear-gradient(135deg, #ec4899, #a855f7, #ec4899);
            background-size: 200% 200%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: gradientText 3s ease-in-out infinite;
        }

        @keyframes gradientText {
            0%, 100% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
        }

        .form-input {
            transition: all 0.4s ease;
            border: 2px solid rgba(255, 255, 255, 0.1);
            background: rgba(255, 255, 255, 0.05);
            color: white;
            width: 100%;
            padding: 14px 18px;
            border-radius: 14px;
            font-size: 15px;
            outline: none;
        }
        
        .form-input:focus {
            border-color: rgba(236, 72, 153, 0.5);
            box-shadow: 0 0 30px rgba(236, 72, 153, 0.1);
            outline: none;
            background: rgba(255, 255, 255, 0.08);
        }
        
        .form-input::placeholder {
            color: rgba(255, 255, 255, 0.3);
        }

        .btn-login {
            background: linear-gradient(135deg, rgba(236, 72, 153, 0.3), rgba(168, 85, 247, 0.3));
            border: 1px solid rgba(236, 72, 153, 0.3);
            transition: all 0.4s ease;
            cursor: pointer;
            color: white;
            border-radius: 14px;
            padding: 16px 32px;
            font-weight: 700;
            font-size: 16px;
            width: 100%;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }
        
        .btn-login:hover {
            transform: translateY(-2px) scale(1.02);
            box-shadow: 0 10px 40px rgba(236, 72, 153, 0.3);
            border-color: rgba(236, 72, 153, 0.5);
        }
        
        .btn-login:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none !important;
        }

        .spinner {
            border: 3px solid rgba(255,255,255,0.05);
            border-top: 3px solid #ec4899;
            border-radius: 50%;
            width: 24px;
            height: 24px;
            animation: spin 1s linear infinite;
            display: inline-block;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .toast {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 9999;
            padding: 16px 24px;
            border-radius: 12px;
            color: white;
            font-weight: 500;
            max-width: 90%;
            display: none;
            box-shadow: 0 10px 40px rgba(0,0,0,0.3);
        }

        .toast.success {
            background: linear-gradient(135deg, #10b981, #059669);
            display: block;
        }

        .toast.error {
            background: linear-gradient(135deg, #ef4444, #dc2626);
            display: block;
        }

        .sweet-float {
            position: fixed;
            z-index: -1;
            opacity: 0.1;
            pointer-events: none;
            font-size: 50px;
            animation: floatSweet 20s ease-in-out infinite;
        }

        @keyframes floatSweet {
            0%, 100% { transform: translate(0, 0) rotate(0deg); }
            25% { transform: translate(30px, -40px) rotate(5deg); }
            50% { transform: translate(-20px, 20px) rotate(-3deg); }
            75% { transform: translate(40px, 30px) rotate(4deg); }
        }

        .float-animation {
            animation: float 6s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
        }

        #registerModal {
            display: none;
            position: fixed;
            inset: 0;
            z-index: 9998;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(10px);
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        #registerModal.show {
            display: flex;
        }

        .modal-content {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(30px);
            border: 1px solid rgba(236, 72, 153, 0.2);
            border-radius: 24px;
            padding: 40px 32px;
            max-width: 420px;
            width: 100%;
            animation: fadeIn 0.3s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.95); }
            to { opacity: 1; transform: scale(1); }
        }

        @media (max-width: 480px) {
            .glass-login { padding: 32px 20px; }
            .modal-content { padding: 32px 20px; }
        }
    </style>
</head>
<body>

    <!-- Background -->
    <div class="login-bg"></div>

    <!-- Floating Elements -->
    <div class="sweet-float" style="top:10%;left:5%;">🍰</div>
    <div class="sweet-float" style="bottom:15%;right:8%;">🎂</div>
    <div class="sweet-float" style="top:40%;left:3%;">🍩</div>
    <div class="sweet-float" style="top:60%;right:5%;">🧁</div>
    <div class="sweet-float" style="top:20%;right:15%;">🍭</div>

    <!-- Toast -->
    <div id="toast" class="toast"></div>

    <!-- Login Box -->
    <div class="glass-login">
        <div class="text-center mb-8">
            <div class="w-20 h-20 rounded-2xl bg-gradient-to-br from-pink-500 to-purple-600 flex items-center justify-center shadow-2xl shadow-pink-500/30 float-animation mx-auto mb-4">
                <i class="fas fa-graduation-cap text-white text-3xl"></i>
            </div>
            <h1 class="text-3xl font-extrabold gradient-text">StudentHub</h1>
            <p class="text-white/40 mt-1 text-sm">Masuk ke dashboard mahasiswa</p>
        </div>

        <form id="loginForm" class="space-y-5">
            <div>
                <label class="block text-sm font-semibold text-white/60 mb-2">
                    <i class="fas fa-envelope mr-2"></i> Email
                </label>
                <input type="email" id="email" required class="form-input" placeholder="Masukkan email Anda" value="demo@studenthub.com">
            </div>

            <div>
                <label class="block text-sm font-semibold text-white/60 mb-2">
                    <i class="fas fa-lock mr-2"></i> Password
                </label>
                <input type="password" id="password" required class="form-input" placeholder="Masukkan password Anda" value="demo123456">
            </div>

            <button type="submit" id="loginBtn" class="btn-login">
                <i class="fas fa-sign-in-alt"></i>
                <span>Masuk</span>
            </button>
        </form>

        <div class="mt-6 text-center">
            <p class="text-white/40 text-sm">
                Belum punya akun? 
                <a href="#" onclick="showRegister()" class="text-pink-400 hover:text-pink-300 font-semibold">
                    Daftar sekarang
                </a>
            </p>
        </div>

        <div class="relative my-6">
            <div class="absolute inset-0 flex items-center">
                <div class="w-full border-t border-white/5"></div>
            </div>
            <div class="relative flex justify-center text-xs">
                <span class="px-4 bg-transparent text-white/20">atau</span>
            </div>
        </div>

        <div class="text-center">
            <button onclick="fillDemo()" class="text-white/40 hover:text-white/70 text-sm bg-white/5 hover:bg-white/10 px-4 py-2 rounded-xl border border-white/5">
                <i class="fas fa-user-astronaut mr-2"></i>
                Isi Akun Demo
            </button>
        </div>
    </div>

    <!-- Register Modal -->
    <div id="registerModal">
        <div class="modal-content">
            <div class="flex items-center justify-between mb-6">
                <h2 class="text-2xl font-bold text-white">
                    <i class="fas fa-user-plus text-pink-400 mr-2"></i>
                    Daftar Akun
                </h2>
                <button onclick="closeRegister()" class="text-white/40 hover:text-white text-2xl">
                    <i class="fas fa-times"></i>
                </button>
            </div>
            
            <form id="registerForm" class="space-y-4">
                <div>
                    <label class="block text-sm font-semibold text-white/60 mb-2">Nama Lengkap</label>
                    <input type="text" id="regName" required class="form-input" placeholder="Masukkan nama lengkap">
                </div>
                <div>
                    <label class="block text-sm font-semibold text-white/60 mb-2">Email</label>
                    <input type="email" id="regEmail" required class="form-input" placeholder="Masukkan email">
                </div>
                <div>
                    <label class="block text-sm font-semibold text-white/60 mb-2">Password</label>
                    <input type="password" id="regPassword" required class="form-input" placeholder="Minimal 6 karakter">
                </div>
                <div>
                    <label class="block text-sm font-semibold text-white/60 mb-2">Konfirmasi Password</label>
                    <input type="password" id="regConfirmPassword" required class="form-input" placeholder="Konfirmasi password">
                </div>
                <button type="submit" id="registerBtn" class="btn-login">
                    <i class="fas fa-user-plus"></i>
                    <span>Daftar</span>
                </button>
            </form>

            <div class="mt-4 text-center">
                <p class="text-white/40 text-sm">
                    Sudah punya akun? 
                    <a href="#" onclick="closeRegister()" class="text-pink-400 hover:text-pink-300 font-semibold">
                        Masuk di sini
                    </a>
                </p>
            </div>
        </div>
    </div>

    <script>
        // ==========================================
        // SUPABASE SETUP
        // ==========================================
        const SUPABASE_URL = 'https://uqkbibbfyfroartqrdem.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_CWW6pPcL-E4nnPOHqk88FA_Rw5In8AP';
        const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        // ==========================================
        // TOAST
        // ==========================================
        function showToast(message, type = 'success') {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.className = `toast ${type}`;
            
            setTimeout(() => {
                toast.className = 'toast';
            }, 4000);
        }

        // ==========================================
        // REGISTER
        // ==========================================
        function showRegister() {
            document.getElementById('registerModal').classList.add('show');
        }

        function closeRegister() {
            document.getElementById('registerModal').classList.remove('show');
        }

        function fillDemo() {
            document.getElementById('email').value = 'demo@studenthub.com';
            document.getElementById('password').value = 'demo123456';
            showToast('✅ Akun demo telah diisi!', 'success');
        }

        // ==========================================
        // LOGIN
        // ==========================================
        document.getElementById('loginForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const btn = document.getElementById('loginBtn');
            const originalText = btn.innerHTML;
            btn.disabled = true;
            btn.innerHTML = '<span class="spinner"></span> Memproses...';

            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;

            try {
                const { data, error } = await sb.auth.signInWithPassword({
                    email: email,
                    password: password
                });

                if (error) {
                    showToast('❌ ' + error.message, 'error');
                } else {
                    showToast('✅ Login berhasil!', 'success');
                    localStorage.setItem('sb-session', JSON.stringify(data.session));
                    
                    setTimeout(() => {
                        window.location.href = 'index.html';
                    }, 1000);
                }
            } catch (error) {
                showToast('❌ Terjadi kesalahan', 'error');
            }

            btn.disabled = false;
            btn.innerHTML = originalText;
        });

        // ==========================================
        // REGISTER
        // ==========================================
        document.getElementById('registerForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const btn = document.getElementById('registerBtn');
            const originalText = btn.innerHTML;
            btn.disabled = true;
            btn.innerHTML = '<span class="spinner"></span> Memproses...';

            const name = document.getElementById('regName').value.trim();
            const email = document.getElementById('regEmail').value.trim();
            const password = document.getElementById('regPassword').value;
            const confirmPassword = document.getElementById('regConfirmPassword').value;

            if (password.length < 6) {
                showToast('❌ Password minimal 6 karakter!', 'error');
                btn.disabled = false;
                btn.innerHTML = originalText;
                return;
            }

            if (password !== confirmPassword) {
                showToast('❌ Password tidak sama!', 'error');
                btn.disabled = false;
                btn.innerHTML = originalText;
                return;
            }

            try {
                const { data, error } = await sb.auth.signUp({
                    email: email,
                    password: password,
                    options: {
                        data: { name: name, full_name: name }
                    }
                });

                if (error) {
                    showToast('❌ ' + error.message, 'error');
                } else {
                    showToast('✅ Pendaftaran berhasil! Silakan login.', 'success');
                    closeRegister();
                    document.getElementById('registerForm').reset();
                    document.getElementById('email').value = email;
                }
            } catch (error) {
                showToast('❌ Terjadi kesalahan', 'error');
            }

            btn.disabled = false;
            btn.innerHTML = originalText;
        });

        // ==========================================
        // CHECK SESSION
        // ==========================================
        (function() {
            const session = localStorage.getItem('sb-session');
            if (session) {
                try {
                    const parsed = JSON.parse(session);
                    if (parsed && parsed.user) {
                        window.location.href = 'index.html';
                    }
                } catch(e) {}
            }
        })();

        // Enter key support
        document.getElementById('password').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                document.getElementById('loginForm').dispatchEvent(new Event('submit'));
            }
        });

        // Close modal on ESC
        document.addEventListener('keydown', function(e) {
            if (e.key === 'Escape') closeRegister();
        });

        // Close modal on outside click
        document.getElementById('registerModal').addEventListener('click', function(e) {
            if (e.target === this) closeRegister();
        });
    </script>
</body>
</html>
